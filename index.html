<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB Game Predictions</title>
  <style>
    :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #3b82f6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 3rem; text-align: center; max-width: 520px; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-top: 0.75rem; }
    .badge { display: inline-block; background: var(--accent); color: white; font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 12px; margin-top: 1.25rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚾</div>
    <h1>MLB Game Predictions</h1>
    <p>This page updates every morning at <strong>9:00 AM CT</strong> with that day's predicted scores, win probabilities, and lineup breakdowns powered by XGBoost + Random Forest.</p>
    <p>The first run is in progress or hasn't fired yet. Check back after 9 AM!</p>
    <span class="badge">Powered by GitHub Actions</span>
  </div>
</body>
</html>
