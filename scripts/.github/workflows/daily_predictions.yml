name: Game Predictions — Daily 9AM CT

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache lineup scout data
        uses: actions/cache@v4
        with:
          path: lineup_scout_cache/
          key: lineup-cache-v3-${{ github.run_id }}
          restore-keys: |
            lineup-cache-v3-

      - name: Run game predictions
        run: python scripts/game_predictions.py

      - name: Commit and push docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git add lineup_scout_cache/
          git diff --staged --quiet || git commit -m "predictions: $(date -u +'%Y-%m-%d') [skip ci]"
          git push
